<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yggdrasil</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: Times New Roman, sans-serif;
            gap: 24px;
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #1a1a2e;
        }

        #uppdragCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            background: #1a1a2e url('assets/Stats.png') center/cover no-repeat;
            display: block;
            margin: 0 auto 16px auto;
        }

        #container {
            text-align: center;
        }

         #inventory {
            text-align: center;
        }

         #inventoryCanvas {
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
                background: #1a1a2e url('assets/F%C3%B6rr%C3%A5d.png') center/contain no-repeat;
        }

        #character {
            text-align: center;
        }

        #characterCanvas {
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #1a1a2e url('assets/Karakt%C3%A4rssida.png') center/contain no-repeat;
        }

        #statsContainer {
            position: absolute;
            bottom: 20;
            left: 20;
        }

        #statsCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            background: #1a1a2e url('assets/Stats.png') center/cover no-repeat;
        }

        /* Canvas under förråd (same size/style as stats canvas) */
        #inventorySubCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            background: #1a1a2e url('assets/Stats.png') center/cover no-repeat;
            display: block;
            /* Move up to roughly match the vertical position of #statsCanvas */
            position: absolute;
            bottom: 20;
            right: 20;
        }
        
        h1 {
            color: #eee;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
    <body>
        <div id="main-flex" style="display: flex; flex-direction: row; align-items: flex-start; gap: 24px; width: 100%; justify-content: center;">
            <div id="character">
                <h1>Karaktär</h1>
                <canvas id="characterCanvas" width="600" height="600"></canvas>
                <div id="statsContainer">
                    <canvas id="statsCanvas" width="600" height="200"></canvas>
                </div>
            </div>
            <div id="container" style="text-align: center;">
                <h1>Yggdrasil</h1>
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                <canvas id="uppdragCanvas" width="800" height="200"></canvas>
            </div>
            <div id="inventory">
                <h1>Förråd</h1>
                <canvas id="inventoryCanvas" width="600" height="600"></canvas>
                <canvas id="inventorySubCanvas" width="600" height="200"></canvas>
            </div>
        </div>
    
    <script src="js/Animationer.js"></script>
