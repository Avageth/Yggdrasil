<body>

    <script>
        const output = document.getElementById('output');
        try {
            output.innerHTML += '<p>Animationer: ' + (typeof Animationer !== 'undefined' ? '✓' : '✗') + '</p>';
            output.innerHTML += '<p>Huvudmeny: ' + (typeof Huvudmeny !== 'undefined' ? '✓' : '✗') + '</p>';

            output.innerHTML += '<p style="color: green;">Alla klasser laddade!</p>';
        } catch(e) {
            output.innerHTML += '<p style="color: red;">Fel: ' + e.message + '</p>';
        }
    </script>
